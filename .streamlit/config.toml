# Configuracion de Streamlit.
[browser]
gatherUsageStats = false

# Tema: color primario verde (igual al del portafolio) para que los controles
# nativos (toggles, foco de inputs, sliders, spinner, radios...) usen el verde
# en lugar del rojo por defecto de Streamlit.
[theme]
base = "light"
primaryColor = "#08D665"
