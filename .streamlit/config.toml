# Configuracion de Streamlit.
[browser]
gatherUsageStats = false

# Tema: color primario morado de la app (DashboardKit) para que los controles
# nativos (toggles, foco de inputs, sliders, spinner, radios...) usen el morado
# en lugar del rojo por defecto de Streamlit.
[theme]
base = "light"
primaryColor = "#7267ef"
